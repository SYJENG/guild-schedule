<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公會小號預約</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EAE4DA;
    --bg-alt: #E1DACD;
    --surface: #F8F4EC;
    --surface-2: #F1EBE0;
    --ink: #56504A;
    --ink-soft: #8A8175;
    --border: #DCD2C0;
    --border-strong: #C9BCA4;
    --morning: #8FA377;
    --morning-bg: #E7EDDF;
    --morning-ink: #566E44;
    --evening: #9B84A0;
    --evening-bg: #EAE1EC;
    --evening-ink: #6B5570;
    --danger: #BD7F6E;
    --danger-bg: #F0DED7;
    --stay: #A6906B;
    --stay-bg: #EAE1CB;
    --stay-ink: #7A6A43;
    --accent: #7E8C74;
    --accent-dark: #6B7862;
    --gold: #B9975E;
    --shadow: 0 2px 10px rgba(90, 78, 58, 0.08);
    --shadow-lg: 0 10px 30px rgba(90, 78, 58, 0.18);
    --radius: 14px;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg-alt) 100%);
    color: var(--ink);
    font-family: "Noto Sans TC", sans-serif;
    min-height: 100vh;
  }
  h1,h2,h3{ font-family: "Noto Serif TC", serif; margin:0; }
  #app{ max-width: 1180px; margin: 0 auto; padding: 20px 20px 60px; }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 4px 22px;
    border-bottom: 1px solid var(--border-strong);
    margin-bottom: 22px;
  }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand-mark{
    width:46px; height:46px; border-radius: 12px;
    background: linear-gradient(145deg, var(--accent), var(--accent-dark));
    color:#F8F4EC; display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow: var(--shadow);
    flex-shrink:0;
  }
  .brand h1{ font-size: 22px; color: var(--ink); letter-spacing: 1px; }
  .brand p{ margin:2px 0 0; font-size:12px; color: var(--ink-soft); letter-spacing:2px; text-transform:uppercase; }

  .admin-controls{ display:flex; align-items:center; gap:10px; }
  .tab-switch{ display:flex; gap:4px; background: var(--surface-2); padding:4px; border-radius: 10px; border:1px solid var(--border); }
  .tab-switch button{
    border:none; background:transparent; padding:7px 14px; border-radius:7px; font-size:13px;
    font-weight:600; color: var(--ink-soft); cursor:pointer; font-family:inherit;
  }
  .tab-switch button.active{ background: var(--surface); color: var(--accent-dark); box-shadow: var(--shadow); }

  button{ cursor:pointer; font-family:inherit; }
  .btn{
    border:1px solid var(--border-strong); background: var(--surface);
    color: var(--ink); padding:9px 16px; border-radius:9px; font-size:13px; font-weight:600;
    transition: all .15s ease;
  }
  .btn:hover{ transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-primary{ background: linear-gradient(145deg, var(--accent), var(--accent-dark)); color:#fff; border-color: var(--accent-dark); }
  .btn-primary:hover{ box-shadow: 0 6px 16px rgba(107,120,98,0.35); }
  .btn-ghost{ background:transparent; border-color: transparent; color: var(--ink-soft); }
  .btn-danger{ background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
  .btn-sm{ padding:5px 10px; font-size:12px; border-radius:7px; }

  .layout{ display:grid; grid-template-columns: 1.5fr 1fr; gap:22px; align-items:start; }
  @media (max-width: 880px){ .layout{ grid-template-columns: 1fr; } }

  .card{
    background: var(--surface); border:1px solid var(--border); border-radius: var(--radius);
    padding: 20px; box-shadow: var(--shadow);
  }
  .card + .card{ margin-top:18px; }

  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-head h2{ font-size:19px; color: var(--ink); }
  .cal-nav{ display:flex; gap:8px; }
  .cal-nav button{
    width:32px; height:32px; border-radius:50%; border:1px solid var(--border-strong);
    background: var(--surface-2); color: var(--ink); font-size:15px; display:flex; align-items:center; justify-content:center;
  }
  .cal-nav button:disabled{ opacity:.35; cursor:not-allowed; }

  .weekdays{ display:grid; grid-template-columns: repeat(7,1fr); gap:6px; margin-bottom:6px; }
  .weekdays span{ text-align:center; font-size:11px; color: var(--ink-soft); font-weight:700; letter-spacing:1px; }

  .weeks-wrap{ display:flex; flex-direction:column; gap:8px; }
  .week-grid{
    display:grid; grid-template-columns: repeat(7,1fr); gap:6px 8px; position:relative;
  }
  .day-frame{
    border-radius:10px; border:1px solid var(--border); background: var(--surface-2);
    padding:7px 8px; position:relative; transition: all .12s ease;
  }
  .day-frame-top{ display:flex; align-items:center; justify-content:space-between; gap:4px; margin-bottom:2px; }
  .day-frame .datenum{ font-size:13px; font-weight:700; color: var(--ink); }
  .holiday-dot{ font-size:13px; cursor:default; }
  .day-frame.adjacent{ background: var(--bg-alt); border-style: dashed; }
  .day-frame.adjacent .datenum{ color: var(--ink-soft); font-weight:600; }
  .day-frame.holiday{ box-shadow: inset 0 3px 0 var(--gold); }
  .day-frame.selectable{ cursor:pointer; }
  .day-frame.selectable:hover{ border-color: var(--accent); box-shadow: 0 0 0 2px rgba(126,140,116,0.15); }
  .day-frame.disabled{ opacity:.6; background: var(--bg-alt); }
  .day-frame.disabled .datenum{ color: var(--ink-soft); }
  .day-frame.today{ border-color: var(--gold); border-width:2px; }
  .day-frame.in-range{ background: #DED2BC; border-color: var(--gold); }
  .cap-note{ font-size:9.5px; color: var(--ink-soft); position:absolute; bottom:5px; left:8px; }
  .cap-note.full{ color: var(--danger); font-weight:700; }

  .resbar{
    height: 24px;
    margin: 2px 0;
    z-index: 5; /* 確保在框框內 */
    position: relative; /* 關鍵：不要用 absolute */
    font-size: 11px;
    display: flex;
    align-items: center;
    padding: 0 4px;
    /* 移除掉會導致重疊的屬性 */
  }
  .resbar.morning{ background: var(--morning-bg); color: var(--morning-ink); border:1px solid var(--morning); }
  .resbar.evening{ background: var(--evening-bg); color: var(--evening-ink); border:1px solid var(--evening); }
  .resbar.clickable{ cursor:pointer; }
  .resbar.clickable:hover{ filter: brightness(0.94); }

  .legend{ display:flex; gap:16px; margin-top:14px; font-size:12px; color: var(--ink-soft); flex-wrap:wrap; }
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; }
  .dot.morning{ background: var(--morning); }
  .dot.evening{ background: var(--evening); }
  .dot.today{ background: var(--gold); }
  .dot.range{ background: #D4C4A4; }

  .form-title{ font-size:16px; margin-bottom:4px; }
  .form-sub{ font-size:12px; color: var(--ink-soft); margin:0 0 16px; }
  .range-display{
    background: var(--surface-2); border:1px dashed var(--border-strong); border-radius:10px;
    padding:12px 14px; font-size:13px; margin-bottom:16px; color: var(--ink);
  }
  .range-display b{ color: var(--accent-dark); }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; font-weight:700; color: var(--ink-soft); margin-bottom:6px; }
  .field label.req::after{ content:" *"; color: var(--danger); }
  .field input[type=text], .field input[type=date], .field input[type=number], .field select{
    width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--border-strong);
    background: var(--surface); color: var(--ink); font-size:14px; font-family:inherit;
  }
  .field input:focus, .field select:focus{ outline:none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(126,140,116,0.18); }
  .period-toggle{ display:flex; gap:8px; }
  .period-toggle button{
    flex:1; padding:10px; border-radius:9px; border:1px solid var(--border-strong); background: var(--surface);
    font-weight:700; font-size:13px; color: var(--ink-soft);
  }
  .period-toggle button.active.morning{ background: var(--morning-bg); border-color: var(--morning); color: var(--morning-ink); }
  .period-toggle button.active.evening{ background: var(--evening-bg); border-color: var(--evening); color: var(--evening-ink); }

  .msg{ font-size:12.5px; padding:10px 12px; border-radius:9px; margin-bottom:14px; }
  .msg.error{ background: var(--danger-bg); color: var(--danger); }
  .msg.success{ background: var(--morning-bg); color: var(--morning-ink); }

  .alert-banner{
    background: linear-gradient(145deg, #EFDCC9, #E8CFAE);
    border:1px solid var(--gold); border-radius: var(--radius);
    padding:16px 18px; margin-bottom:18px; box-shadow: var(--shadow);
  }
  .alert-banner h3{ font-size:14px; color:#7A5A2A; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .alert-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .alert-chip{ background:#F8F4EC; border:1px solid #D8B788; padding:6px 12px; border-radius:8px; font-size:12.5px; color:#5B4A2E; }
  .alert-empty{ font-size:13px; color:#7A6A4A; }

  table{ width:100%; border-collapse: collapse; font-size:13px; }
  th{ text-align:left; padding:9px 10px; color: var(--ink-soft); font-size:11px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border-strong); }
  td{ padding:10px 10px; border-bottom:1px solid var(--border); }
  tr:hover td{ background: var(--surface-2); }
  .tag{ padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700; }
  .tag.morning{ background: var(--morning-bg); color: var(--morning-ink); }
  .tag.evening{ background: var(--evening-bg); color: var(--evening-ink); }
  .row-actions{ display:flex; gap:6px; }
  .empty-state{ text-align:center; padding:30px; color: var(--ink-soft); font-size:13px; }

  .settings-grid{ display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
  .radio-row{ display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:13px; }
  .hint{ font-size:11px; color: var(--ink-soft); margin-top:4px; }

  .modal-backdrop{
    position:fixed; inset:0; background: rgba(60,52,40,0.35); backdrop-filter: blur(2px);
    display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .modal{
    background: var(--surface); border-radius: var(--radius); padding:24px; width:100%; max-width:420px;
    box-shadow: var(--shadow-lg); border:1px solid var(--border);
  }
  .modal h3{ font-size:17px; margin-bottom:14px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }

  .toast{
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    background: var(--ink); color:#fff; padding:11px 20px; border-radius:9px; font-size:13px;
    box-shadow: var(--shadow-lg); z-index:200; opacity:0; transition: opacity .25s ease, top .25s ease;
    pointer-events:none;
  }
  .toast.show{ opacity:1; top:28px; }
  .toast.error{ background: var(--danger); }
  .toast.success{ background: var(--accent-dark); }

  .badge-admin{
    font-size:10px; background: var(--gold); color:#fff; padding:2px 8px; border-radius:6px; font-weight:700; letter-spacing:.5px;
  }
  ::placeholder{ color:#B7AD9C; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">⛨</div>
      <div>
        <h1>公會小號預約</h1>
        <p>Guild Access Scheduler</p>
      </div>
    </div>
    <div class="admin-controls" id="adminControls"></div>
  </div>
  <div id="viewRoot"></div>
</div>
<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<script>
(function(){
  "use strict";

  const ADMIN_PASSWORD = "admin123"; // 管理者密碼，可自行修改

  // Supabase 設定：取代 Claude Artifact 專屬的 window.storage
  const SUPABASE_URL = "https://ipuiikywfbqwuypenshl.supabase.co";
  const SUPABASE_KEY = "sb_publishable_DfYbmgIEjEVZu21j5wf1kQ_-KygmVxx";

  const WEEKDAYS = ["日","一","二","三","四","五","六"];
  const PERIOD_LABEL = { morning: "早段", evening: "晚段" };

  let state = {
    reservations: [],
    settings: { advanceMonths: 2, capacity: 5, endMode: "forever", endDate: null },
    holidays: [],
    isAdmin: false,
    tab: "calendar", // calendar | admin
    viewYear: null,
    viewMonth: null, // 0-indexed
    selStart: null,
    selEnd: null,
    entryPeriod: "morning",
    exitPeriod: "morning",
    mainName: "",
    altName: "",
    note: "",
    formError: "",
    editingId: null,
    editingHolidayId: null,
    pendingHolidayIcon: null,
    pendingEditHolidayIcon: null,
    loaded: false
  };

  // ---------- date utils ----------
  function pad(n){ return n < 10 ? "0"+n : ""+n; }
  function toStr(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function todayDate(){ const d = new Date(); d.setHours(0,0,0,0); return d; }
  function todayStr(){ return toStr(todayDate()); }
  function addMonthsClamped(date, n){
    const d = new Date(date.getFullYear(), date.getMonth(), 1);
    const targetMonth = d.getMonth() + n;
    const targetDate = new Date(d.getFullYear(), targetMonth, 1);
    const lastDay = new Date(targetDate.getFullYear(), targetDate.getMonth()+1, 0).getDate();
    const day = Math.min(date.getDate(), lastDay);
    return new Date(targetDate.getFullYear(), targetDate.getMonth(), day);
  }
  function maxAllowedDate(){
    return addMonthsClamped(todayDate(), Number(state.settings.advanceMonths) || 0);
  }
  function cmpStr(a,b){ return a < b ? -1 : (a > b ? 1 : 0); }

  // ---------- storage (Supabase kv_store 表) ----------
  async function sbGet(key){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/kv_store?key=eq.${encodeURIComponent(key)}&select=value`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    if(!res.ok) throw new Error("Supabase get failed: " + res.status);
    const data = await res.json();
    return data.length > 0 ? data[0].value : null;
  }
  async function sbSet(key, value){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/kv_store`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        Prefer: "resolution=merge-duplicates"
      },
      body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
    });
    if(!res.ok) throw new Error("Supabase set failed: " + res.status);
  }

  async function loadAll(){
    try{
      const v = await sbGet("reservations");
      state.reservations = v ? JSON.parse(v) : [];
    }catch(e){ state.reservations = []; }
    try{
      const v = await sbGet("settings");
      state.settings = v ? JSON.parse(v) : state.settings;
    }catch(e){ /* keep default */ }
    try{
      const v = await sbGet("holidays");
      state.holidays = v ? JSON.parse(v) : [];
    }catch(e){ state.holidays = []; }
    try{
      state.isAdmin = localStorage.getItem("guildIsAdmin") === "true";
    }catch(e){ state.isAdmin = false; }
    state.loaded = true;
  }
  async function saveReservations(){
    try{ await sbSet("reservations", JSON.stringify(state.reservations)); }
    catch(e){ toast("儲存預約失敗，請稍後再試", "error"); }
  }
  async function saveSettings(){
    try{ await sbSet("settings", JSON.stringify(state.settings)); }
    catch(e){ toast("儲存設定失敗，請稍後再試", "error"); }
  }
  async function saveHolidays(){
    try{ await sbSet("holidays", JSON.stringify(state.holidays)); }
    catch(e){ toast("儲存節日失敗，請稍後再試", "error"); }
  }
  async function persistAdminFlag(val){
    try{ localStorage.setItem("guildIsAdmin", val ? "true" : "false"); }catch(e){}
  }
  async function refreshShared(){
    try{
      const v = await sbGet("reservations");
      state.reservations = v ? JSON.parse(v) : [];
    }catch(e){}
    try{
      const v = await sbGet("settings");
      state.settings = v ? JSON.parse(v) : state.settings;
    }catch(e){}
    try{
      const v = await sbGet("holidays");
      state.holidays = v ? JSON.parse(v) : [];
    }catch(e){}
    // 若使用者正在輸入框中打字（例如節日名稱、姓名、備註），暫緩重繪，避免蓋掉尚未送出的內容
    const activeTag = document.activeElement && document.activeElement.tagName;
    const isEditingField = activeTag === "INPUT" || activeTag === "SELECT" || activeTag === "TEXTAREA";
    if(!document.getElementById("modalRoot").firstChild && !isEditingField){ render(); }
  }

  // ---------- helpers ----------
  // 所有涵蓋此日期的預約（不分早晚），用於「開放位子」總容留人數計算
  function occupantsOn(dateStr, excludeId){
    return state.reservations.filter(r =>
      r.id !== excludeId && dateStr >= r.start && dateStr <= r.end
    );
  }
  // 計算某日期符合哪些特別節日設定（依每週星期幾＋可選的開始／結束日期）
  function holidaysOn(dateStr){
    const dow = parseDateStr(dateStr).getDay();
    return state.holidays.filter(h => {
      if(!h.weekdays.includes(dow)) return false;
      if(h.startDate && dateStr < h.startDate) return false;
      if(h.endMode === "fixed" && h.endDate && dateStr > h.endDate) return false;
      return true;
    });
  }
  function isWithinWindow(dateStr){
    const max = toStr(maxAllowedDate());
    if(dateStr < todayStr()) return false;
    if(dateStr > max) return false;
    if(state.settings.endMode === "fixed" && state.settings.endDate && dateStr > state.settings.endDate) return false;
    return true;
  }
  function uid(){ return "r_" + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function parseDateStr(s){ const p = s.split("-").map(Number); return new Date(p[0], p[1]-1, p[2]); }

  function toast(msg, type){
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "toast show" + (type ? " "+type : "");
    clearTimeout(toast._t);
    toast._t = setTimeout(()=>{ el.className = "toast"; }, 3000);
  }

  // ---------- rendering ----------
  function render(){
    if(state.viewYear === null){
      const t = todayDate();
      state.viewYear = t.getFullYear();
      state.viewMonth = t.getMonth();
    }
    renderTopbarControls();
    const root = document.getElementById("viewRoot");
    if(!state.isAdmin){
      root.innerHTML = renderUserView();
    } else {
      root.innerHTML = renderAdminShell();
    }
    attachHandlers();
  }

  function renderTopbarControls(){
    const el = document.getElementById("adminControls");
    if(state.isAdmin){
      el.innerHTML = `
        <div class="tab-switch">
          <button data-act="tab" data-tab="calendar" class="${state.tab==='calendar'?'active':''}">預約月曆</button>
          <button data-act="tab" data-tab="admin" class="${state.tab==='admin'?'active':''}">管理後台</button>
        </div>
        <span class="badge-admin">管理者</span>
        <button class="btn btn-ghost btn-sm" data-act="logout">登出</button>
      `;
    } else {
      el.innerHTML = `<button class="btn btn-ghost btn-sm" data-act="login-open">管理者登入</button>`;
    }
  }

  function renderUserView(){
    return `
      <div class="layout">
        <div class="card">${renderCalendarCard(true)}</div>
        <div class="card">${renderBookingForm()}</div>
      </div>
    `;
  }

  function renderAdminShell(){
    if(state.tab === "admin"){
      return `
        ${renderTodayAlert()}
        <div class="card">${renderSettingsForm()}</div>
        <div class="card">${renderHolidayManager()}</div>
        <div class="card">${renderReservationTable()}</div>
      `;
    }
    return `
      <div class="layout">
        <div class="card">${renderCalendarCard(true)}</div>
        <div>
          <div class="card">${renderBookingForm()}</div>
          <div class="card">${renderAdminSidePanel()}</div>
        </div>
      </div>
    `;
  }

  function renderAdminSidePanel(){
    return `
      ${renderTodayAlertCompact()}
      <div class="form-title">目前設定</div>
      <p class="form-sub">於「管理後台」分頁可調整</p>
      <div class="field"><label>開放預約範圍</label>
        <div style="font-size:13px;">今日起可預約至 <b>${state.settings.advanceMonths}</b> 個月後</div>
      </div>
      <div class="field"><label>開放位子</label>
        <div style="font-size:13px;">每日總容留上限 <b>${state.settings.capacity}</b> 人</div>
      </div>
      <div class="field"><label>開放期限</label>
        <div style="font-size:13px;">${state.settings.endMode==='forever' ? '永遠開放' : ('至 '+state.settings.endDate)}</div>
      </div>
      <div style="margin-top:10px;">點選月曆上的姓名標籤可直接編輯該筆預約。</div>
    `;
  }

  function renderTodayAlert(){
    const t = todayStr();
    const leaving = state.reservations.filter(r => r.end === t);
    return `
      <div class="alert-banner">

  function diffDaysStr(aStr, bStr){
    return Math.round((parseDateStr(bStr) - parseDateStr(aStr)) / 86400000);

  // 單一日期方格的外框（背景、邊框、日期數字、節日小圖示、容留人數），高度貫穿整週
  function buildDayFrame(dateObj, day, colIndex, selectable, adjacent){
    const dateStr = toStr(dateObj);
    const within = isWithinWindow(dateStr);
    const isToday = dateStr === todayStr();
    const inRange = state.selStart && state.selEnd && dateStr >= state.selStart && dateStr <= state.selEnd;
    const holidays = holidaysOn(dateStr);
    const occupants = occupantsOn(dateStr);

    let holidayDot = "";
    if(holidays.length > 0){
      const titles = holidays.map(h => {
        const rangeText = h.startDate ? `，${h.startDate} 起` : "";
        const endText = h.endMode === "fixed" && h.endDate ? `至 ${h.endDate}` : "永遠重複";
        return `${h.label}（每週${h.weekdays.map(i=>WEEKDAYS[i]).join('、')}${rangeText}，${endText}）`;
      }).join("；");
      holidayDot = `<span class="holiday-dot" title="${escapeHtml(titles)}">🎌</span>`;
    }

    let capNote = "";
    const cap = Number(state.settings.capacity) || 0;
    
    // --- 這裡要先定義 full 變數 ---
    const full = occupants.length >= cap; 
    
    if(cap > 0){
      capNote = `<div class="cap-note ${full?'full':''}" style="position: relative; margin-top: auto;">位 ${occupants.length}/${cap}</div>`;
    }

    const classes = ["day-frame"];
    // ... 後面程式碼保持不變
    if(selectable && within) classes.push("selectable");
    if(!within) classes.push("disabled");
    if(isToday) classes.push("today");
    if(inRange) classes.push("in-range");
    if(adjacent) classes.push("adjacent");
    if(holidays.length > 0) classes.push("holiday");

    const dateLabel = adjacent ? `${dateObj.getMonth()+1}/${day}` : day;

    return `
      <div class="${classes.join(" ")}" style="grid-column:${colIndex+1}; grid-row: 1 / -1; display: flex; flex-direction: column;">
        <div class="day-frame-top" style="flex: 0 0 auto;"><span class="datenum">${dateLabel}</span>${holidayDot}</div>
        <div class="cap-note ${full?'full':''}" style="position: relative; margin-top: auto;">${capNote}</div> 
      </div>
    `;
  }

  // 一整週的預約橫條：計算重疊區間並分配「軌道(lane)」，同一筆預約全程同一色、同一列，不再逐日分開堆疊
  function buildWeekGrid(weekDays, selectable){
    const weekStartStr = weekDays[0].dateStr;
    const weekEndStr = weekDays[6].dateStr;

    const overlapping = state.reservations
      .filter(r => r.start <= weekEndStr && r.end >= weekStartStr)
      .sort((a,b) => cmpStr(a.start, b.start) || cmpStr(a.id, b.id));

    const laneEnds = [];
    const bars = [];
    overlapping.forEach(r => {
      const colStart = Math.max(0, diffDaysStr(weekStartStr, r.start));
      const colEnd = Math.min(6, diffDaysStr(weekStartStr, r.end));
      let lane = laneEnds.findIndex(endCol => endCol < colStart);
      if(lane === -1){ lane = laneEnds.length; laneEnds.push(colEnd); }
      else { laneEnds[lane] = colEnd; }
      bars.push({
        r, colStart, colEnd, lane,
        isTrueStart: r.start >= weekStartStr,
        isTrueEnd: r.end <= weekEndStr
      });
    });
    const laneCount = bars.length ? Math.max(...bars.map(b=>b.lane)) + 1 : 0;

    let framesHtml = "";
    weekDays.forEach((d,i) => {
      framesHtml += buildDayFrame(d.dateObj, d.day, i, selectable, d.adjacent);
    });

    let barsHtml = "";
    bars.forEach(b => {
      const r = b.r;
      const cls = r.entryPeriod === "morning" ? "morning" : "evening";
      const adminAttrs = state.isAdmin ? ` clickable" data-act="edit-open" data-id="${r.id}` : "";
      let label = "";
      if(b.isTrueStart){
        const icon = r.entryPeriod === "morning" ? "☀" : "☾";
        label += `▶${icon} `;
      }
      label += escapeHtml(r.mainName);
      if(b.isTrueEnd){
        const icon = r.exitPeriod === "morning" ? "☀" : "☾";
        label += ` ${icon}◀`;
      }
      const title = `${PERIOD_LABEL[r.entryPeriod]}進入／${PERIOD_LABEL[r.exitPeriod]}離開：${escapeHtml(r.mainName)}（${r.start} ～ ${r.end}）`;
      barsHtml += `<div class="resbar ${cls}${adminAttrs}" style="grid-column:${b.colStart+1} / ${b.colEnd+2};grid-row:${b.lane+2}; z-index: 10; position: relative;" title="${title}">${label}</div>`;
    });

    return `<div class="week-grid" style="grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(60px, auto); gap: 8px;">
          ${framesHtml}
          ${barsHtml}
        </div>`;
  }

  function renderCalendarCard(selectable){
    const y = state.viewYear, m = state.viewMonth;
    const monthName = `${y} 年 ${m+1} 月`;
    const first = new Date(y, m, 1);
    const startWeekday = first.getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const t = todayDate();
    const isCurrentRealMonth = (y === t.getFullYear() && m === t.getMonth());

    let gridDays = [];
    // 補齊本月第一週前段，直接顯示上個月月底的日期（可視情況點選）
    if(startWeekday > 0){
      const prevMonthLastDay = new Date(y, m, 0).getDate();
      for(let i=0;i<startWeekday;i++){
        const day = prevMonthLastDay - startWeekday + 1 + i;
        const dateObj = new Date(y, m-1, day);
        gridDays.push({ dateObj, day, adjacent: true, dateStr: toStr(dateObj) });
      }
    }
    for(let day=1; day<=daysInMonth; day++){
      const dateObj = new Date(y,m,day);
      gridDays.push({ dateObj, day, adjacent: false, dateStr: toStr(dateObj) });
    }
    // 補齊最後一列，直接顯示下個月月初的日期（可點選）
    const trailingNeeded = (7 - (gridDays.length % 7)) % 7;
    for(let day=1; day<=trailingNeeded; day++){
      const dateObj = new Date(y, m+1, day);
      gridDays.push({ dateObj, day, adjacent: true, dateStr: toStr(dateObj) });
    }

    let weeksHtml = "";
    for(let w=0; w<gridDays.length/7; w++){
      const weekDays = gridDays.slice(w*7, w*7+7);
      weeksHtml += buildWeekGrid(weekDays, selectable);
    }

    return `
      <div class="cal-head">
        <h2>${monthName}</h2>
        <div class="cal-nav">
          <button data-act="prev-month" ${isCurrentRealMonth?"disabled":""}>‹</button>
          <button data-act="next-month">›</button>
        </div>
      </div>
      ${selectable && state.selStart ? `<div class="hint" style="margin-bottom:10px;background:var(--surface-2);padding:8px 10px;border-radius:8px;">已選範圍：<b>${state.selStart}</b> ～ <b>${state.selEnd}</b>，可切換月份繼續點選以調整範圍（點範圍外延伸、點範圍內重新選單日）</div>` : ""}
      <div class="weekdays">${WEEKDAYS.map(w=>`<span>${w}</span>`).join("")}</div>
      <div class="weeks-wrap">${weeksHtml}</div>
      <div class="legend">
        <span><i class="dot morning"></i>☀ 早段進入</span>
        <span><i class="dot evening"></i>☾ 晚段進入</span>
        <span>▶ 進入　◀ 離開（同一筆預約整段同色顯示）</span>
        <span><i class="dot today"></i>今天</span>
        <span><i class="dot range"></i>已選範圍</span>
        <span style="border:1px dashed var(--border-strong); padding:1px 6px; border-radius:5px;">相鄰月份日期</span>
        <span>🎌 特別節日</span>
      </div>
    `;
  }

  // 將上傳的圖片縮小成小圖示（避免資料庫存太大），回傳 base64 dataURL
  function resizeImageToDataURL(file, maxDim){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if(w > h){ if(w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; } }
          else { if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; } }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/png"));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

    openModal(`
      <div class="modal" data-stop="1">
        <h3>刪除預約</h3>
        <p style="font-size:13px;">確定要刪除 <b>${escapeHtml(r.mainName)}</b>（${r.start} ～ ${r.end}，${PERIOD_LABEL[r.entryPeriod]}進入／${PERIOD_LABEL[r.exitPeriod]}離開）的預約嗎？此動作無法復原。</p>
        <div class="modal-actions">
          <button class="btn btn-ghost" data-act="modal-close">取消</button>
          <button class="btn btn-danger" data-act="delete-confirm">確定刪除</button>
        </div>
      </div>
    `);
  }

  function openHolidayEditModal(id){
    const h = state.holidays.find(x=>x.id===id);
    if(!h) return;
    state.editingHolidayId = id;
    state.pendingEditHolidayIcon = null;
    openModal(`
      <div class="modal" data-stop="1">
        <h3>編輯節日</h3>
        <div class="field"><label>節日名稱</label><input type="text" id="editHolidayLabel" value="${escapeHtml(h.label)}"></div>
        <div class="field">
          <label>節日圖示（選填，不更換則維持原本圖示）</label>
          <input type="file" id="editHolidayIconFile" accept="image/*">
          <img id="editHolidayIconPreview" src="${h.icon || ''}" style="display:${h.icon?'inline-block':'none'};width:32px;height:32px;object-fit:cover;border-radius:6px;border:1px solid var(--border-strong);margin-top:6px;">
        </div>
        <div class="field">
          <label>每週重複星期（可複選）</label>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            ${WEEKDAYS.map((w,i) => `
              <label style="display:flex;align-items:center;gap:5px;font-size:13px;background:var(--surface-2);padding:6px 10px;border-radius:8px;border:1px solid var(--border-strong);">
                <input type="checkbox" class="editHolidayWeekdayChk" value="${i}" ${h.weekdays.includes(i)?'checked':''}> 週${w}
              </label>
            `).join("")}
          </div>
        </div>
        <div class="field">
          <label>開始日期</label>
          <input type="date" id="editHolidayStartDate" value="${h.startDate || todayStr()}">
        </div>
        <div class="field">
          <label>重複結束時間</label>
          <div class="radio-row">
            <input type="radio" name="editHolidayEndMode" id="editHolidayEndForever" value="forever" ${h.endMode==='forever'?'checked':''}>
            <label for="editHolidayEndForever" style="margin:0;">不設結束日期</label>
          </div>
          <div class="radio-row">
            <input type="radio" name="editHolidayEndMode" id="editHolidayEndFixed" value="fixed" ${h.endMode==='fixed'?'checked':''}>
            <label for="editHolidayEndFixed" style="margin:0;">設定結束日期</label>
          </div>
          <input type="date" id="editHolidayEndDate" value="${h.endDate || ''}" ${h.endMode!=='fixed'?'disabled':''}>
        </div>
        <div id="editHolidayErr" class="msg error" style="display:none;"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" data-act="modal-close">取消</button>
          <button class="btn btn-primary" data-act="holiday-edit-save">儲存變更</button>
        </div>
      </div>
    `);
  }

  async function doLogin(){
    const val = document.getElementById("loginPassInput").value;
    if(val === ADMIN_PASSWORD){
      state.isAdmin = true;
      await persistAdminFlag(true);
      closeModal();
      toast("登入成功", "success");
      render();
    } else {
      document.getElementById("loginErr").style.display = "block";
    }
  }

  async function doLogout(){
    state.isAdmin = false;
    state.tab = "calendar";
    await persistAdminFlag(false);
    toast("已登出");
    render();
  }

  // ---------- booking logic ----------
  function handleDayPick(dateStr){
    if(!state.selStart){
      // 尚未選擇：第一次點選為單日
      state.selStart = dateStr; state.selEnd = dateStr;
    } else if(dateStr > state.selEnd){
      // 點在目前範圍之後：往後延伸結束日
      state.selEnd = dateStr;
    } else if(dateStr < state.selStart){
      // 點在目前範圍之前：往前延伸開始日
      state.selStart = dateStr;
    } else {
      // 點在目前範圍之內：視為重新開始選擇單日
      state.selStart = dateStr; state.selEnd = dateStr;
    }
    state.formError = "";
    render();
  }

  async function submitBooking(){
    const mainName = (document.getElementById("mainNameInput")||{}).value?.trim() || "";
    const altName = (document.getElementById("altNameInput")||{}).value?.trim() || "";
    const note = (document.getElementById("noteInput")||{}).value?.trim() || "";
    state.mainName = mainName; state.altName = altName; state.note = note;

    const start = state.selStart;
    const end = state.selEnd || state.selStart;
    if(!start){ state.formError = "請先於月曆選擇日期"; render(); return; }
    if(!state.entryPeriod){ state.formError = "請選擇進入時段"; render(); return; }
    if(!state.exitPeriod){ state.formError = "請選擇離開時段"; render(); return; }
    if(!mainName){ state.formError = "請輸入本尊姓名"; render(); return; }
    if(!altName){ state.formError = "請輸入小號姓名"; render(); return; }
    if(!isWithinWindow(start) || !isWithinWindow(end)){ state.formError = "所選日期超出目前開放的預約範圍"; render(); return; }

    // capacity check across the whole range（每日總容留人數，不分早晚）
    const cap = Number(state.settings.capacity) || 0;
    let d = parseDateStr(start);
    const endD = parseDateStr(end);
    while(d <= endD){
      const ds = toStr(d);
      const count = occupantsOn(ds).length;
      if(cap > 0 && count >= cap){
        state.formError = `${ds} 已達開放位子上限（${cap} 人），請調整日期範圍`;
        render();
        return;
      }
      d.setDate(d.getDate()+1);
    }

    const rec = { id: uid(), start, end, entryPeriod: state.entryPeriod, exitPeriod: state.exitPeriod, mainName, altName, note, createdAt: Date.now() };
    state.reservations.push(rec);
    await saveReservations();

    state.selStart = null; state.selEnd = null; state.mainName = ""; state.altName = ""; state.note = ""; state.formError = "";
    toast("預約成功！", "success");
    render();
  }

  async function saveEdit(){
    const r = state.reservations.find(x=>x.id===state.editingId);
    if(!r) return;
    const start = document.getElementById("editStart").value;
    const end = document.getElementById("editEnd").value;
    const entryPeriod = document.getElementById("editEntryPeriod").value;
    const exitPeriod = document.getElementById("editExitPeriod").value;
    const mainName = document.getElementById("editMain").value.trim();
    const altName = document.getElementById("editAlt").value.trim();
    const note = document.getElementById("editNote").value.trim();
    const errEl = document.getElementById("editErr");
    if(!start || !end || start > end){ errEl.textContent = "日期範圍不正確"; errEl.style.display="block"; return; }
    if(!mainName || !altName){ errEl.textContent = "本尊與小號姓名為必填"; errEl.style.display="block"; return; }

    r.start = start; r.end = end; r.entryPeriod = entryPeriod; r.exitPeriod = exitPeriod; r.mainName = mainName; r.altName = altName; r.note = note;
    await saveReservations();
    closeModal();
    toast("已更新預約", "success");
    render();
  }

  async function confirmDelete(){
    state.reservations = state.reservations.filter(x=>x.id!==state.editingId);
    await saveReservations();
    closeModal();
    toast("已刪除預約", "success");
    render();
  }

  async function saveSettingsFromForm(){
    const advance = Math.max(0, Number(document.getElementById("setAdvance").value) || 0);
    const capacity = Math.max(1, Number(document.getElementById("setCapacity").value) || 1);
    const endMode = document.querySelector('input[name="endMode"]:checked').value;
    const endDate = document.getElementById("setEndDate").value;
    if(endMode === "fixed" && !endDate){
      toast("請選擇結束日期", "error"); return;
    }
    state.settings = { advanceMonths: advance, capacity, endMode, endDate: endMode==="fixed" ? endDate : null };
    await saveSettings();
    toast("設定已儲存", "success");
    render();
  }

  async function addHoliday(){
    const label = document.getElementById("holidayLabel").value.trim();
    const weekdays = Array.from(document.querySelectorAll(".holidayWeekdayChk:checked")).map(c => Number(c.value));
    const startDate = document.getElementById("holidayStartDate").value;
    const endMode = document.querySelector('input[name="holidayEndMode"]:checked').value;
    const endDate = document.getElementById("holidayEndDate").value;
    if(!label){ toast("請輸入節日名稱", "error"); return; }
    if(weekdays.length === 0){ toast("請至少選擇一個重複星期", "error"); return; }
    if(!startDate){ toast("請選擇開始日期", "error"); return; }
    if(endMode === "fixed" && !endDate){ toast("請選擇重複結束日期", "error"); return; }
    if(endMode === "fixed" && endDate < startDate){ toast("結束日期不能早於開始日期", "error"); return; }
    state.holidays.push({ id: uid(), label, weekdays, startDate, endMode, endDate: endMode==="fixed" ? endDate : null, icon: state.pendingHolidayIcon || null });
    state.pendingHolidayIcon = null;
    await saveHolidays();
    toast("節日已新增", "success");
    render();
  }

  async function deleteHoliday(id){
    state.holidays = state.holidays.filter(h => h.id !== id);
    await saveHolidays();
    toast("節日已刪除", "success");
    render();
  }

  async function saveHolidayEdit(){
    const h = state.holidays.find(x => x.id === state.editingHolidayId);
    if(!h) return;
    const label = document.getElementById("editHolidayLabel").value.trim();
    const weekdays = Array.from(document.querySelectorAll(".editHolidayWeekdayChk:checked")).map(c => Number(c.value));
    const startDate = document.getElementById("editHolidayStartDate").value;
    const endMode = document.querySelector('input[name="editHolidayEndMode"]:checked').value;
    const endDate = document.getElementById("editHolidayEndDate").value;
    const errEl = document.getElementById("editHolidayErr");
    if(!label){ errEl.textContent = "請輸入節日名稱"; errEl.style.display = "block"; return; }
    if(weekdays.length === 0){ errEl.textContent = "請至少選擇一個重複星期"; errEl.style.display = "block"; return; }
    if(!startDate){ errEl.textContent = "請選擇開始日期"; errEl.style.display = "block"; return; }
    if(endMode === "fixed" && !endDate){ errEl.textContent = "請選擇重複結束日期"; errEl.style.display = "block"; return; }
    if(endMode === "fixed" && endDate < startDate){ errEl.textContent = "結束日期不能早於開始日期"; errEl.style.display = "block"; return; }

    h.label = label; h.weekdays = weekdays; h.startDate = startDate; h.endMode = endMode; h.endDate = endMode === "fixed" ? endDate : null;
    if(state.pendingEditHolidayIcon){ h.icon = state.pendingEditHolidayIcon; }
    state.pendingEditHolidayIcon = null;
    await saveHolidays();
    closeModal();
    toast("節日已更新", "success");
    render();
  }

  // ---------- event delegation ----------
  function attachHandlers(){
    // nothing extra needed; using body-level delegation set once in init()
  }

  function onBodyClick(e){
    const backdrop = e.target.closest('[data-act="modal-backdrop"]');
    if(backdrop && !e.target.closest('[data-stop]')){ closeModal(); return; }

    const t = e.target.closest("[data-act]");
    if(!t) return;
    const act = t.getAttribute("data-act");

    switch(act){
      case "login-open": openLoginModal(); break;
      case "login-submit": doLogin(); break;
      case "logout": doLogout(); break;
      case "modal-close": closeModal(); break;
      case "tab": state.tab = t.getAttribute("data-tab"); render(); break;
      case "prev-month": {
        const t0 = todayDate();
        if(!(state.viewYear===t0.getFullYear() && state.viewMonth===t0.getMonth())){
          state.viewMonth--; if(state.viewMonth<0){ state.viewMonth=11; state.viewYear--; }
          render();
        }
        break;
      }
      case "next-month": state.viewMonth++; if(state.viewMonth>11){ state.viewMonth=0; state.viewYear++; } render(); break;
      case "pick-day": handleDayPick(t.getAttribute("data-date")); break;
      case "clear-sel": state.selStart=null; state.selEnd=null; state.formError=""; render(); break;
      case "set-entry-period": state.entryPeriod = t.getAttribute("data-period"); render(); break;
      case "set-exit-period": state.exitPeriod = t.getAttribute("data-period"); render(); break;
      case "submit-booking": submitBooking(); break;
      case "edit-open": openEditModal(t.getAttribute("data-id")); break;
      case "delete-open": openDeleteModal(t.getAttribute("data-id")); break;
      case "edit-save": saveEdit(); break;
      case "delete-confirm": confirmDelete(); break;
      case "save-settings": saveSettingsFromForm(); break;
      case "add-holiday": addHoliday(); break;
      case "delete-holiday": deleteHoliday(t.getAttribute("data-id")); break;
      case "holiday-edit-open": openHolidayEditModal(t.getAttribute("data-id")); break;
      case "holiday-edit-save": saveHolidayEdit(); break;
    }
  }

  function onBodyChange(e){
    if(e.target && e.target.name === "endMode"){
      const dateInput = document.getElementById("setEndDate");
      if(dateInput) dateInput.disabled = (e.target.value !== "fixed");
    }
    if(e.target && e.target.name === "holidayEndMode"){
      const dateInput = document.getElementById("holidayEndDate");
      if(dateInput) dateInput.disabled = (e.target.value !== "fixed");
    }
    if(e.target && e.target.name === "editHolidayEndMode"){
      const dateInput = document.getElementById("editHolidayEndDate");
      if(dateInput) dateInput.disabled = (e.target.value !== "fixed");
    }
    if(e.target && e.target.id === "holidayIconFile"){
      const file = e.target.files[0];
      if(file){
        resizeImageToDataURL(file, 64).then(dataUrl => {
          state.pendingHolidayIcon = dataUrl;
          const preview = document.getElementById("holidayIconPreview");
          if(preview){ preview.src = dataUrl; preview.style.display = "inline-block"; }
        }).catch(() => toast("圖片讀取失敗，請換一張試試", "error"));
      }
    }
    if(e.target && e.target.id === "editHolidayIconFile"){
      const file = e.target.files[0];
      if(file){
        resizeImageToDataURL(file, 64).then(dataUrl => {
          state.pendingEditHolidayIcon = dataUrl;
          const preview = document.getElementById("editHolidayIconPreview");
          if(preview){ preview.src = dataUrl; preview.style.display = "inline-block"; }
        }).catch(() => toast("圖片讀取失敗，請換一張試試", "error"));
      }
    }
  }

  function onBodyInput(e){
    if(e.target && e.target.id === "mainNameInput"){ state.mainName = e.target.value; }
    if(e.target && e.target.id === "altNameInput"){ state.altName = e.target.value; }
    if(e.target && e.target.id === "noteInput"){ state.note = e.target.value; }
  }

  // 修改 init 函數，確保即使讀取失敗，網頁也能渲染
  async function init(){
    document.getElementById("viewRoot").innerHTML = `<div class="empty-state">載入中…</div>`;
    
    try {
        await loadAll();
    } catch (e) {
        console.error("載入資料失敗，改為讀取本地快取", e);
        // 確保即使讀取失敗，state 也有基本初始值，讓畫面可以出來
    }
    
    render(); // 無論如何都嘗試渲染
    document.body.addEventListener("click", onBodyClick);
    document.body.addEventListener("change", onBodyChange);
    document.body.addEventListener("input", onBodyInput);
    setInterval(refreshShared, 15000);
  }

  init();
})();
</script>
</body>
</html>
