<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公會小號預約</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #EAE4DA;
    --bg-alt: #E1DACD;
    --surface: #F8F4EC;
    --surface-2: #F1EBE0;
    --ink: #56504A;
    --ink-soft: #8A8175;
    --border: #DCD2C0;
    --border-strong: #C9BCA4;
    --morning: #8FA377;
    --morning-bg: #E7EDDF;
    --morning-ink: #566E44;
    --evening: #9B84A0;
    --evening-bg: #EAE1EC;
    --evening-ink: #6B5570;
    --danger: #BD7F6E;
    --danger-bg: #F0DED7;
    --stay: #A6906B;
    --stay-bg: #EAE1CB;
    --stay-ink: #7A6A43;
    --accent: #7E8C74;
    --accent-dark: #6B7862;
    --gold: #B9975E;
    --shadow: 0 2px 10px rgba(90, 78, 58, 0.08);
    --shadow-lg: 0 10px 30px rgba(90, 78, 58, 0.18);
    --radius: 14px;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg-alt) 100%);
    color: var(--ink);
    font-family: "Noto Sans TC", sans-serif;
    min-height: 100vh;
  }
  h1,h2,h3{ font-family: "Noto Serif TC", serif; margin:0; }
  #app{ max-width: 1180px; margin: 0 auto; padding: 20px 20px 60px; }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 4px 22px;
    border-bottom: 1px solid var(--border-strong);
    margin-bottom: 22px;
  }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand-mark{
    width:46px; height:46px; border-radius: 12px;
    background: linear-gradient(145deg, var(--accent), var(--accent-dark));
    color:#F8F4EC; display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow: var(--shadow);
    flex-shrink:0;
  }
  .brand h1{ font-size: 22px; color: var(--ink); letter-spacing: 1px; }
  .brand p{ margin:2px 0 0; font-size:12px; color: var(--ink-soft); letter-spacing:2px; text-transform:uppercase; }

  .admin-controls{ display:flex; align-items:center; gap:10px; }
  .tab-switch{ display:flex; gap:4px; background: var(--surface-2); padding:4px; border-radius: 10px; border:1px solid var(--border); }
  .tab-switch button{
    border:none; background:transparent; padding:7px 14px; border-radius:7px; font-size:13px;
    font-weight:600; color: var(--ink-soft); cursor:pointer; font-family:inherit;
  }
  .tab-switch button.active{ background: var(--surface); color: var(--accent-dark); box-shadow: var(--shadow); }

  button{ cursor:pointer; font-family:inherit; }
  .btn{
    border:1px solid var(--border-strong); background: var(--surface);
    color: var(--ink); padding:9px 16px; border-radius:9px; font-size:13px; font-weight:600;
    transition: all .15s ease;
  }
  .btn:hover{ transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-primary{ background: linear-gradient(145deg, var(--accent), var(--accent-dark)); color:#fff; border-color: var(--accent-dark); }
  .btn-primary:hover{ box-shadow: 0 6px 16px rgba(107,120,98,0.35); }
  .btn-ghost{ background:transparent; border-color: transparent; color: var(--ink-soft); }
  .btn-danger{ background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
  .btn-sm{ padding:5px 10px; font-size:12px; border-radius:7px; }

  .layout{ display:grid; grid-template-columns: 1.5fr 1fr; gap:22px; align-items:start; }
  @media (max-width: 880px){ .layout{ grid-template-columns: 1fr; } }

  .card{
    background: var(--surface); border:1px solid var(--border); border-radius: var(--radius);
    padding: 20px; box-shadow: var(--shadow);
  }
  .card + .card{ margin-top:18px; }

  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-head h2{ font-size:19px; color: var(--ink); }
  .cal-nav{ display:flex; gap:8px; }
  .cal-nav button{
    width:32px; height:32px; border-radius:50%; border:1px solid var(--border-strong);
    background: var(--surface-2); color: var(--ink); font-size:15px; display:flex; align-items:center; justify-content:center;
  }
  .cal-nav button:disabled{ opacity:.35; cursor:not-allowed; }

  .weekdays{ display:grid; grid-template-columns: repeat(7,1fr); gap:6px; margin-bottom:6px; }
  .weekdays span{ text-align:center; font-size:11px; color: var(--ink-soft); font-weight:700; letter-spacing:1px; }
  .grid{ display:grid; grid-template-columns: repeat(7,1fr); gap:6px; }
  .weeks-wrap{ display:flex; flex-direction:column; gap:6px; }
  .week-row{ position:relative; }
  .day-grid{ display:grid; grid-template-columns: repeat(7,1fr); gap:6px; }
  .event-layer{
    position:absolute; left:0; right:0; display:grid;
    grid-template-columns: repeat(7,1fr); column-gap:6px; pointer-events:none;
  }
  .event-bar{
    pointer-events:auto; display:flex; align-items:center; gap:3px; padding:1px 6px;
    font-size:10.5px; font-weight:700; color:#fff; overflow:hidden; white-space:nowrap;
  }
  .event-bar.bar-start{ border-top-left-radius:8px; border-bottom-left-radius:8px; padding-left:7px; }
  .event-bar.bar-end{ border-top-right-radius:8px; border-bottom-right-radius:8px; padding-right:7px; }
  .event-bar .bar-name{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0; }
  .event-bar .bar-note{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; opacity:.88; }
  .event-bar[data-act]{ cursor:pointer; }
  .event-bar[data-act]:hover{ filter:brightness(1.1); box-shadow:0 1px 5px rgba(0,0,0,0.28); }
  .cell{
    min-height:84px; border-radius:10px; border:1px solid var(--border);
    background: var(--surface-2); padding:6px 6px 5px; position:relative;
    display:flex; flex-direction:column; gap:3px; transition: all .12s ease;
  }
  .cell-bottom{
    position:absolute; left:6px; right:6px; bottom:5px;
    display:flex; align-items:flex-end; justify-content:space-between; gap:4px;
  }
  .holiday-icons{ display:flex; gap:3px; margin-left:auto; }
  .holiday-icon{ display:inline-flex; }

  .mini-cal-card{ padding:16px 18px; }
  .mini-cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .mini-cal-head b{ font-size:14px; font-family:"Noto Serif TC", serif; color:var(--ink); }
  .mini-cal-head .cal-nav button{ width:24px; height:24px; font-size:12px; }
  .mini-weekdays{ display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:3px; }
  .mini-weekdays span{ text-align:center; font-size:9.5px; color:var(--ink-soft); font-weight:700; }
  .mini-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
  .mini-cell{ text-align:center; font-size:11.5px; padding:6px 0; border-radius:6px; cursor:pointer; color:var(--ink); }
  .mini-cell:hover{ background:var(--surface); box-shadow:var(--shadow); }
  .mini-cell.adjacent{ color:var(--ink-soft); opacity:.5; }
  .mini-cell.today{ background:var(--gold); color:#fff; font-weight:700; }
  .mini-cell.in-range{ background:#DED2BC; }
  .mini-cell.disabled{ opacity:.35; cursor:not-allowed; }
  .mini-cell{ position:relative; }
  .mini-cell.full{ background: var(--danger-bg); color: var(--danger); font-weight:700; }
  .mini-full-dot{
    position:absolute; left:50%; bottom:2px; transform:translateX(-50%);
    width:4px; height:4px; border-radius:50%; background: var(--danger);
  }

  .icon-picker{ display:flex; flex-wrap:wrap; gap:8px; }
  .icon-option{
    display:flex; align-items:center; gap:5px; background:var(--surface-2); border:1px solid var(--border-strong);
    border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer; color:var(--ink-soft);
  }
  .icon-option input{ margin:0; }
  .icon-option:has(input:checked){ border-color:var(--accent); background:var(--morning-bg); color:var(--accent-dark); font-weight:700; }
  .cell.empty{ background:transparent; border-color:transparent; }
  .cell.adjacent{ background: var(--bg-alt); border-style: dashed; }
  .cell.adjacent .datenum{ color: var(--ink-soft); font-weight:600; }
  .cell.holiday{ box-shadow: inset 0 3px 0 var(--gold); }
  .cell.selectable{ cursor:pointer; }
  .cell.selectable:hover{ border-color: var(--accent); box-shadow: 0 0 0 2px rgba(126,140,116,0.15); }
  .cell.disabled{ opacity:.6; background: var(--bg-alt); }
  .cell.today{ border-color: var(--gold); border-width:2px; }
  .cell.in-range{ background: #DED2BC; border-color: var(--gold); }
  .cell.range-end{ background: #D4C4A4; }
  .cell .datenum{ font-size:12px; font-weight:700; color: var(--ink); }
  .cell.disabled .datenum{ color: var(--ink-soft); }
  .cap-note{ font-size:9px; color: var(--ink-soft); }
  .cap-note-wrap{ display:flex; align-items:flex-end; }
  .cap-note.full{ color: var(--danger); font-weight:700; }

  .legend{ display:flex; gap:16px; margin-top:14px; font-size:12px; color: var(--ink-soft); flex-wrap:wrap; }
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; }
  .dot.morning{ background: var(--morning); }
  .dot.evening{ background: var(--evening); }
  .dot.today{ background: var(--gold); }
  .dot.range{ background: #D4C4A4; }
  .dot.stay{ background: var(--stay); }

  .form-title{ font-size:16px; margin-bottom:4px; }
  .form-sub{ font-size:12px; color: var(--ink-soft); margin:0 0 16px; }
  .range-display{
    background: var(--surface-2); border:1px dashed var(--border-strong); border-radius:10px;
    padding:12px 14px; font-size:13px; margin-bottom:16px; color: var(--ink);
  }
  .range-display b{ color: var(--accent-dark); }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; font-weight:700; color: var(--ink-soft); margin-bottom:6px; }
  .field label.req::after{ content:" *"; color: var(--danger); }
  .field input[type=text], .field input[type=date], .field input[type=number], .field select{
    width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--border-strong);
    background: var(--surface); color: var(--ink); font-size:14px; font-family:inherit;
  }
  .field input:focus, .field select:focus{ outline:none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(126,140,116,0.18); }
  .period-toggle{ display:flex; gap:8px; }
  .period-toggle button{
    flex:1; padding:10px; border-radius:9px; border:1px solid var(--border-strong); background: var(--surface);
    font-weight:700; font-size:13px; color: var(--ink-soft);
  }
  .period-toggle button.active.morning{ background: var(--morning-bg); border-color: var(--morning); color: var(--morning-ink); }
  .period-toggle button.active.evening{ background: var(--evening-bg); border-color: var(--evening); color: var(--evening-ink); }
  .icon-type-btn.active{ background: var(--morning-bg); border-color: var(--accent); color: var(--accent-dark); }

  .msg{ font-size:12.5px; padding:10px 12px; border-radius:9px; margin-bottom:14px; }
  .msg.error{ background: var(--danger-bg); color: var(--danger); }
  .msg.success{ background: var(--morning-bg); color: var(--morning-ink); }

  .alert-banner{
    background: linear-gradient(145deg, #EFDCC9, #E8CFAE);
    border:1px solid var(--gold); border-radius: var(--radius);
    padding:16px 18px; margin-bottom:18px; box-shadow: var(--shadow);
  }
  .alert-banner h3{ font-size:14px; color:#7A5A2A; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .alert-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .alert-chip{ background:#F8F4EC; border:1px solid #D8B788; padding:6px 12px; border-radius:8px; font-size:12.5px; color:#5B4A2E; }
  .alert-empty{ font-size:13px; color:#7A6A4A; }

  table{ width:100%; border-collapse: collapse; font-size:13px; }
  th{ text-align:left; padding:9px 10px; color: var(--ink-soft); font-size:11px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border-strong); }
  td{ padding:10px 10px; border-bottom:1px solid var(--border); }
  tr:hover td{ background: var(--surface-2); }
  .tag{ padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700; }
  .tag.morning{ background: var(--morning-bg); color: var(--morning-ink); }
  .tag.evening{ background: var(--evening-bg); color: var(--evening-ink); }
  .row-actions{ display:flex; gap:6px; }
  .empty-state{ text-align:center; padding:30px; color: var(--ink-soft); font-size:13px; }

  .settings-grid{ display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
  .radio-row{ display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:13px; }
  .hint{ font-size:11px; color: var(--ink-soft); margin-top:4px; }

  .modal-backdrop{
    position:fixed; inset:0; background: rgba(60,52,40,0.35); backdrop-filter: blur(2px);
    display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .modal{
    background: var(--surface); border-radius: var(--radius); padding:24px; width:100%; max-width:420px;
    box-shadow: var(--shadow-lg); border:1px solid var(--border);
  }
  .modal h3{ font-size:17px; margin-bottom:14px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }

  .toast{
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    background: var(--ink); color:#fff; padding:11px 20px; border-radius:9px; font-size:13px;
    box-shadow: var(--shadow-lg); z-index:200; opacity:0; transition: opacity .25s ease, top .25s ease;
    pointer-events:none;
  }
  .toast.show{ opacity:1; top:28px; }
  .toast.error{ background: var(--danger); }
  .toast.success{ background: var(--accent-dark); }

  .badge-admin{
    font-size:10px; background: var(--gold); color:#fff; padding:2px 8px; border-radius:6px; font-weight:700; letter-spacing:.5px;
  }
  ::placeholder{ color:#B7AD9C; }
</style>
</head>

</div>
<div id="modalRoot"></div>

  function getAllIcons(){ return BUILTIN_ICONS.concat(state.customIcons || []); }
  function getIconDef(key){ return getAllIcons().find(i=>i.key===key) || BUILTIN_ICONS[0]; }
  function iconHtml(key, size){
    const def = getIconDef(key);
    const sz = size || 16;
    if(def.type === "image") return `<img src="${def.value}" alt="${def.label}" style="width:${sz}px;height:${sz}px;object-fit:contain;vertical-align:middle;border-radius:3px;">`;
    return `<span style="font-size:${sz}px;line-height:1;vertical-align:middle;">${def.value}</span>`;
  }

  // 每筆預約依 id 雜湊固定分配一種顏色，讓月曆上不同預約一眼可辨
  const RESERVATION_COLOR_PALETTE = [
    "#8FA377", "#9B84A0", "#C0925E", "#6E9B94", "#BD7F6E",
    "#7E8CB9", "#A6906B", "#5E9B7A", "#B98BAE", "#8C9E5E"
  ];
  function reservationColor(id){
    let hash = 0;
    const s = String(id || "");
    for(let i=0;i<s.length;i++){ hash = (hash * 31 + s.charCodeAt(i)) >>> 0; }
    return RESERVATION_COLOR_PALETTE[hash % RESERVATION_COLOR_PALETTE.length];
  }

    settings: { advanceMonths: 2, capacity: 5, endMode: "forever", endDate: null },

  // ---------- date utils ----------
  function pad(n){ return n < 10 ? "0"+n : ""+n; }
  function toStr(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function todayDate(){ const d = new Date(); d.setHours(0,0,0,0); return d; }
  function todayStr(){ return toStr(todayDate()); }
  function addMonthsClamped(date, n){
    const d = new Date(date.getFullYear(), date.getMonth(), 1);
    const targetMonth = d.getMonth() + n;
    const targetDate = new Date(d.getFullYear(), targetMonth, 1);
    const lastDay = new Date(targetDate.getFullYear(), targetDate.getMonth()+1, 0).getDate();
    const day = Math.min(date.getDate(), lastDay);
    return new Date(targetDate.getFullYear(), targetDate.getMonth(), day);
  }
  function maxAllowedDate(){
    return addMonthsClamped(todayDate(), Number(state.settings.advanceMonths) || 0);
  }
  function cmpStr(a,b){ return a < b ? -1 : (a > b ? 1 : 0); }

  // ---------- storage (Supabase kv_store) ----------
  async function kvGet(key, defaultValue){
    try{
      const { data, error } = await supabaseClient
        .from(KV_TABLE)
        .select("value")
        .eq("key", key)
        .maybeSingle();
      if(error) throw error;
      return data ? data.value : defaultValue;
    }catch(e){
      console.error("kvGet failed for key="+key, e);
      return defaultValue;
    }
  }
  // 注意：這裡故意沒有 kvSet／直接寫入函式。收緊 RLS 後，anon key 已無法直接寫入 kv_store，
  // 所有寫入都必須經過 kv-write 這支 Edge Function（見 callEdgeFunction），這是刻意的安全設計。

async function loadAll(){
    const resRaw = await kvGet("reservations", []);
    const holRaw = await kvGet("holidays", []);
    const iconRaw = await kvGet("customIcons", []);

    state.reservations = forceArray(resRaw);
    state.holidays = forceArray(holRaw);
    state.customIcons = forceArray(iconRaw);
    
    state.settings = await kvGet("settings", state.settings);
  

    try{
      state.isAdmin = localStorage.getItem("isAdmin") === "true";
      state.adminPassword = localStorage.getItem("adminPassword") || "";
    }catch(e){ state.isAdmin = false; state.adminPassword = ""; }
    
    state.loaded = true;
  }
  // 以下四個 save 函式都改為透過 Edge Function 的 admin-write 動作寫入，
  // 由伺服器端重新比對密碼，前端存的密碼只是「附上去給伺服器驗證用」，本身不具直接寫入資料庫的權限。
  async function saveReservations(){
    try{ await callEdgeFunction({ action: "admin-write", password: state.adminPassword, key: "reservations", value: state.reservations }); }
    catch(e){ toast(e.message || "儲存預約失敗，請稍後再試", "error"); }
  }
  async function saveSettings(){
    try{ await callEdgeFunction({ action: "admin-write", password: state.adminPassword, key: "settings", value: state.settings }); }
    catch(e){ toast(e.message || "儲存設定失敗，請稍後再試", "error"); }
  }
  async function saveHolidays(){
    try{ await callEdgeFunction({ action: "admin-write", password: state.adminPassword, key: "holidays", value: state.holidays }); }
    catch(e){ toast(e.message || "儲存節日失敗，請稍後再試", "error"); }
  }
  async function saveCustomIcons(){
    try{ await callEdgeFunction({ action: "admin-write", password: state.adminPassword, key: "customIcons", value: state.customIcons }); }
    catch(e){ toast(e.message || "儲存圖示失敗，請稍後再試", "error"); }
  }
 async function refreshShared(){
    const [reservations, settings, holidays, customIcons] = await Promise.all([
      kvGet("reservations", []),
      kvGet("settings", state.settings),
      kvGet("holidays", []),
      kvGet("customIcons", [])
    ]);
    
    // 這裡一定要加上 forceArray 確保資料格式轉換
    state.reservations = forceArray(reservations);
    state.settings = settings;
    state.holidays = forceArray(holidays);
    state.customIcons = forceArray(customIcons);
    
    const activeTag = document.activeElement && document.activeElement.tagName;
    const isEditingField = activeTag === "INPUT" || activeTag === "SELECT" || activeTag === "TEXTAREA";
    if(!document.getElementById("modalRoot").firstChild && !isEditingField){ render(); }

  // ---------- helpers ----------
function occupantsOn(dateStr, excludeId){
    // 強制確保 state.reservations 是陣列
    const resList = Array.isArray(state.reservations) ? state.reservations : [];
    return resList.filter(r =>
      r.id !== excludeId && dateStr >= r.start && dateStr <= r.end
    );
  }
  // 計算某日期符合哪些特別節日設定（依每週星期幾＋可選的開始／結束日期）
function holidaysOn(dateStr){
    const dow = parseDateStr(dateStr).getDay();
    // 強制確保 state.holidays 是陣列
    const holList = Array.isArray(state.holidays) ? state.holidays : [];
    return holList.filter(h => {
      if(!h.weekdays.includes(dow)) return false;
      if(h.startDate && dateStr < h.startDate) return false;
      if(h.endMode === "fixed" && h.endDate && dateStr > h.endDate) return false;
      return true;
    });
  }
  function isWithinWindow(dateStr){
    const max = toStr(maxAllowedDate());
    if(dateStr < todayStr()) return false;
    if(dateStr > max) return false;
    if(state.settings.endMode === "fixed" && state.settings.endDate && dateStr > state.settings.endDate) return false;
    return true;
  }
  function uid(){ return "r_" + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function parseDateStr(s){ const p = s.split("-").map(Number); return new Date(p[0], p[1]-1, p[2]); }

    toast._t = setTimeout(()=>{ el.className = "toast"; }, 3000);

  function buildDayCell(dateObj, day, selectable, adjacent, minHeightPx){
    const dateStr = toStr(dateObj);
    const within = isWithinWindow(dateStr);
    const isToday = dateStr === todayStr();
    const inRange = state.selStart && state.selEnd && dateStr >= state.selStart && dateStr <= state.selEnd;
    const holidays = holidaysOn(dateStr);

    let holidayIconsHtml = "";
    if(holidays.length){
      holidayIconsHtml = `<div class="holiday-icons">${holidays.map(h => {
        const rangeText = h.startDate ? `，${h.startDate} 起` : "";
        const endText = h.endMode === "fixed" && h.endDate ? `至 ${h.endDate}` : "永遠重複";
        const title = `${escapeHtml(h.label)}（每週${h.weekdays.map(i=>WEEKDAYS[i]).join('、')}${rangeText}，${endText}）`;
        return `<span class="holiday-icon" title="${title}">${iconHtml(h.icon || "island", 16)}</span>`;
      }).join("")}</div>`;
    }

    const occupants = occupantsOn(dateStr);
    let capNote = "";
    const cap = Number(state.settings.capacity)||0;
    if(cap > 0){
      const full = occupants.length >= cap;
      capNote = `<div class="cap-note ${full?'full':''}">位 ${occupants.length}/${cap}</div>`;
    }

    const classes = ["cell"];
    if(selectable && within) classes.push("selectable");
    if(!within) classes.push("disabled");
    if(isToday) classes.push("today");
    if(inRange) classes.push("in-range");
    if(adjacent) classes.push("adjacent");
    if(holidays.length > 0) classes.push("holiday");

    const dateLabel = adjacent ? `${dateObj.getMonth()+1}/${day}` : day;
    const styleAttr = minHeightPx ? ` style="min-height:${minHeightPx}px;"` : "";

    return `
      <div class="${classes.join(" ")}"${styleAttr} ${selectable && within ? `data-act="pick-day" data-date="${dateStr}"` : ""}>
        <div class="datenum">${dateLabel}</div>
        <div class="cell-bottom">
          <div class="cap-note-wrap">${capNote}</div>
          ${holidayIconsHtml}
        </div>
      </div>
    `;
  }

  // 依「週」為單位，計算該週內所有跨天預約的橫條區段與所需的排列軌道（避免重疊）
 function buildWeekSegments(dateStrs){
    const weekStart = dateStrs[0], weekEnd = dateStrs[6];
    // 強制確保 state.reservations 是陣列
    const resList = Array.isArray(state.reservations) ? state.reservations : [];
    const overlapping = resList.filter(r => r.start <= weekEnd && r.end >= weekStart);
    // ... 後續程式碼保持不變 ...
    overlapping.sort((a,b) => cmpStr(a.start,b.start) || cmpStr(b.end,a.end));
    const laneLastCol = [];
    const segments = [];
    overlapping.forEach(r => {
      let colStart = dateStrs.findIndex(d => d >= r.start);
      if(colStart === -1) colStart = 0;
      let colEnd = -1;
      for(let i=6;i>=0;i--){ if(dateStrs[i] <= r.end){ colEnd = i; break; } }
      if(colEnd === -1) colEnd = 6;
      const isTrueStart = dateStrs[colStart] === r.start;
      const isTrueEnd = dateStrs[colEnd] === r.end;
      let lane = laneLastCol.findIndex(lastCol => lastCol < colStart);
      if(lane === -1){ lane = laneLastCol.length; laneLastCol.push(colEnd); }
      else { laneLastCol[lane] = colEnd; }
      segments.push({ r, colStart, colEnd, isTrueStart, isTrueEnd, lane });
    });
    return { segments, laneCount: laneLastCol.length };
  }

  function renderEventBar(seg){
    const r = seg.r;
    const classes = ["event-bar"];
    if(seg.isTrueStart) classes.push("bar-start");
    if(seg.isTrueEnd) classes.push("bar-end");
    const adminAttrs = state.isAdmin ? ` data-act="edit-open" data-id="${r.id}"` : "";
    const entryIcon = r.entryPeriod === "morning" ? "☀" : "☾";
    const exitIcon = r.exitPeriod === "morning" ? "☀" : "☾";
    let inner = "";
    if(seg.isTrueStart) inner += `<span class="bar-icon">${entryIcon}</span>`;
    inner += `<span class="bar-name">${escapeHtml(r.mainName)}</span>`;
    if(r.note) inner += `<span class="bar-note">・${escapeHtml(r.note)}</span>`;
    if(seg.isTrueEnd) inner += `<span class="bar-icon">${exitIcon}</span>`;
    const noteText = r.note ? `　備註：${escapeHtml(r.note)}` : "";
    const title = `${escapeHtml(r.mainName)}（小號：${escapeHtml(r.altName)}）　${PERIOD_LABEL[r.entryPeriod]}進入 ${r.start} ～ ${PERIOD_LABEL[r.exitPeriod]}離開 ${r.end}${noteText}`;
    const bg = reservationColor(r.id);
    const style = `grid-column:${seg.colStart+1} / ${seg.colEnd+2}; grid-row:${seg.lane+1}; background:${bg};`;
    return `<div class="${classes.join(" ")}" style="${style}" title="${escapeHtml(title)}"${adminAttrs}>${inner}</div>`;
  }

  function renderMiniCalendar(){
    const y = state.miniViewYear, m = state.miniViewMonth;
    const first = new Date(y, m, 1);
    const startWeekday = first.getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const t = todayDate();
    const isCurrentRealMonth = (y === t.getFullYear() && m === t.getMonth());
    const cap = Number(state.settings.capacity) || 0;

    const entries = [];
    if(startWeekday > 0){
      const prevMonthLastDay = new Date(y, m, 0).getDate();
      for(let i=0;i<startWeekday;i++){
        const day = prevMonthLastDay - startWeekday + 1 + i;
        entries.push({ dateObj: new Date(y, m-1, day), day, adjacent:true });
      }
    }
    for(let day=1; day<=daysInMonth; day++) entries.push({ dateObj: new Date(y,m,day), day, adjacent:false });
    const trailingNeeded = (7 - (entries.length % 7)) % 7;
    for(let day=1; day<=trailingNeeded; day++) entries.push({ dateObj: new Date(y, m+1, day), day, adjacent:true });

    const cellsHtml = entries.map(e => {
      const dateStr = toStr(e.dateObj);
      const isToday = dateStr === todayStr();
      const isFull = cap > 0 && occupantsOn(dateStr).length >= cap;
      const classes = ["mini-cell"];
      if(e.adjacent) classes.push("adjacent");
      if(isToday) classes.push("today");
      if(isFull) classes.push("full");
      const title = isFull ? ` title="已滿額"` : "";
      return `<div class="${classes.join(" ")}" data-act="mini-pick-day" data-date="${dateStr}"${title}>${e.day}${isFull ? '<span class="mini-full-dot"></span>' : ''}</div>`;
    }).join("");

    return `
      <div class="mini-cal">
        <div class="mini-cal-head">
          <b>${y} 年 ${m+1} 月</b>
          <div class="cal-nav">
            <button data-act="mini-prev-month" ${isCurrentRealMonth?"disabled":""}>‹</button>
            <button data-act="mini-next-month">›</button>
          </div>
        </div>
        <div class="mini-weekdays">${WEEKDAYS.map(w=>`<span>${w}</span>`).join("")}</div>
        <div class="mini-grid">${cellsHtml}</div>
      </div>
    `;
  }

  function renderCalendarCard(selectable){
    const y = state.viewYear, m = state.viewMonth;
    const monthName = `${y} 年 ${m+1} 月`;
    const first = new Date(y, m, 1);
    const startWeekday = first.getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const t = todayDate();
    const isCurrentRealMonth = (y === t.getFullYear() && m === t.getMonth());

    const dayEntries = [];
    // 補齊本月第一週前段，直接顯示上個月月底的日期（可視情況點選）
    if(startWeekday > 0){
      const prevMonthLastDay = new Date(y, m, 0).getDate();
      for(let i=0;i<startWeekday;i++){
        const day = prevMonthLastDay - startWeekday + 1 + i;
        dayEntries.push({ dateObj: new Date(y, m-1, day), day, adjacent:true });
      }
    }
    for(let day=1; day<=daysInMonth; day++){
      dayEntries.push({ dateObj: new Date(y,m,day), day, adjacent:false });
    }
    // 補齊最後一列，直接顯示下個月月初的日期（可點選）
    const trailingNeeded = (7 - (dayEntries.length % 7)) % 7;
    for(let day=1; day<=trailingNeeded; day++){
      dayEntries.push({ dateObj: new Date(y, m+1, day), day, adjacent:true });
    }

    const BASE_H = 50, LANE_H = 20, LANE_GAP = 4, TOP_OFFSET = 22;

    // 先計算每一週所需要的橫條軌道數，取全月最大值，讓所有週的日期列高度一致固定
    const weeksData = [];
    for(let w=0; w<dayEntries.length; w+=7){
      const weekEntries = dayEntries.slice(w, w+7);
      const dateStrs = weekEntries.map(e => toStr(e.dateObj));
      const { segments, laneCount } = buildWeekSegments(dateStrs);
      weeksData.push({ weekEntries, segments, laneCount });
    }
    const maxLaneCount = weeksData.reduce((max, wd) => Math.max(max, wd.laneCount), 0);
    const fixedCellHeightPx = Math.max(84, BASE_H + maxLaneCount*(LANE_H+LANE_GAP));

    let weeksHtml = "";
    weeksData.forEach(wd => {
      const dayGridHtml = wd.weekEntries.map(e => buildDayCell(e.dateObj, e.day, selectable, e.adjacent, fixedCellHeightPx)).join("");
      const eventLayerHtml = maxLaneCount > 0
        ? `<div class="event-layer" style="top:${TOP_OFFSET}px; grid-template-rows:repeat(${maxLaneCount},${LANE_H}px); row-gap:${LANE_GAP}px;">${wd.segments.map(renderEventBar).join("")}</div>`
        : "";
      weeksHtml += `<div class="week-row"><div class="day-grid">${dayGridHtml}</div>${eventLayerHtml}</div>`;
    });

    const seenHolidayTypes = new Set();
    const holidayLegendItems = [];
    state.holidays.forEach(h => {
      const key = (h.icon || "island") + "|" + h.label;
      if(!seenHolidayTypes.has(key)){
        seenHolidayTypes.add(key);
        holidayLegendItems.push(`<span>${iconHtml(h.icon || "island", 13)} ${escapeHtml(h.label)}</span>`);
      }
    });
    const holidayLegendHtml = holidayLegendItems.length ? holidayLegendItems.join("") : "";

    return `
      <div class="cal-head">
        <h2>${monthName}</h2>
        <div class="cal-nav">
          <button data-act="prev-month" ${isCurrentRealMonth?"disabled":""}>‹</button>
          <button data-act="next-month">›</button>
        </div>
      </div>
      ${selectable && state.selStart ? `<div class="hint" style="margin-bottom:10px;background:var(--surface-2);padding:8px 10px;border-radius:8px;">已選範圍：<b>${state.selStart}</b> ～ <b>${state.selEnd}</b>，可切換月份繼續點選以調整範圍（點範圍外延伸、點範圍內重新選單日）</div>` : ""}
      <div class="weekdays">${WEEKDAYS.map(w=>`<span>${w}</span>`).join("")}</div>
      <div class="weeks-wrap">${weeksHtml}</div>

  // ---------- booking logic ----------
  function handleDayPick(dateStr){
    if(!state.selStart){
      // 尚未選擇：第一次點選為單日
      state.selStart = dateStr; state.selEnd = dateStr;
    } else if(dateStr > state.selEnd){
      // 點在目前範圍之後：往後延伸結束日
      state.selEnd = dateStr;
    } else if(dateStr < state.selStart){
      // 點在目前範圍之前：往前延伸開始日
      state.selStart = dateStr;
    } else {
      // 點在目前範圍之內：視為重新開始選擇單日
      state.selStart = dateStr; state.selEnd = dateStr;
    }
    state.formError = "";
    render();
  }

  async function submitBooking(){
    const mainName = (document.getElementById("mainNameInput")||{}).value?.trim() || "";
    const altName = (document.getElementById("altNameInput")||{}).value?.trim() || "";
    const note = (document.getElementById("noteInput")||{}).value?.trim() || "";
    state.mainName = mainName; state.altName = altName; state.note = note;

    const start = state.selStart;
    const end = state.selEnd || state.selStart;
    if(!start){ state.formError = "請先於月曆選擇日期"; render(); return; }
    if(!state.entryPeriod){ state.formError = "請選擇進入時段"; render(); return; }
    if(!state.exitPeriod){ state.formError = "請選擇離開時段"; render(); return; }
    if(!mainName){ state.formError = "請輸入本尊姓名"; render(); return; }
    if(!altName){ state.formError = "請輸入小號姓名"; render(); return; }
    if(!isWithinWindow(start) || !isWithinWindow(end)){ state.formError = "所選日期超出目前開放的預約範圍"; render(); return; }

    // capacity check across the whole range（每日總容留人數，不分早晚）
    const cap = Number(state.settings.capacity) || 0;
    let d = parseDateStr(start);
    const endD = parseDateStr(end);
    while(d <= endD){
      const ds = toStr(d);
      const count = occupantsOn(ds).length;
      if(cap > 0 && count >= cap){
        state.formError = `${ds} 已達開放位子上限（${cap} 人），請調整日期範圍`;
        render();
        return;
      }
      d.setDate(d.getDate()+1);
    }

    // 實際新增動作交給 Edge Function 處理：伺服器端會重新檢查容量與日期範圍，
    // 且只會「附加一筆」，不會覆蓋既有資料，因此不需要密碼也能安全地開放給所有人使用。
    try{
      const result = await callEdgeFunction({
        action: "add-reservation",
        value: { start, end, entryPeriod: state.entryPeriod, exitPeriod: state.exitPeriod, mainName, altName, note }
      });
      state.reservations.push(result.reservation);
      state.selStart = null; state.selEnd = null; state.mainName = ""; state.altName = ""; state.note = ""; state.formError = "";
      toast("預約成功！", "success");
      render();
    }catch(e){
      state.formError = e.message || "預約失敗，請稍後再試";
      render();
    }
  }

  async function saveEdit(){
    const r = state.reservations.find(x=>x.id===state.editingId);
    if(!r) return;
    const start = document.getElementById("editStart").value;
    const end = document.getElementById("editEnd").value;
    const entryPeriod = document.getElementById("editEntryPeriod").value;
    const exitPeriod = document.getElementById("editExitPeriod").value;
    const mainName = document.getElementById("editMain").value.trim();
    const altName = document.getElementById("editAlt").value.trim();
    const note = document.getElementById("editNote").value.trim();
    const errEl = document.getElementById("editErr");
    if(!start || !end || start > end){ errEl.textContent = "日期範圍不正確"; errEl.style.display="block"; return; }
    if(!mainName || !altName){ errEl.textContent = "本尊與小號姓名為必填"; errEl.style.display="block"; return; }

    r.start = start; r.end = end; r.entryPeriod = entryPeriod; r.exitPeriod = exitPeriod; r.mainName = mainName; r.altName = altName; r.note = note;
    await saveReservations();
    closeModal();
    toast("已更新預約", "success");
    render();
  }

  async function confirmDelete(){
    state.reservations = state.reservations.filter(x=>x.id!==state.editingId);
    await saveReservations();
    closeModal();
    toast("已刪除預約", "success");
    render();
  }

  async function saveSettingsFromForm(){
    const advance = Math.max(0, Number(document.getElementById("setAdvance").value) || 0);
    const capacity = Math.max(1, Number(document.getElementById("setCapacity").value) || 1);
    const endMode = document.querySelector('input[name="endMode"]:checked').value;
    const endDate = document.getElementById("setEndDate").value;
    if(endMode === "fixed" && !endDate){
      toast("請選擇結束日期", "error"); return;
    }
    state.settings = { advanceMonths: advance, capacity, endMode, endDate: endMode==="fixed" ? endDate : null };
    await saveSettings();
    toast("設定已儲存", "success");
    render();
  }

  async function addHoliday(){
    const label = document.getElementById("holidayLabel").value.trim();
    const weekdays = Array.from(document.querySelectorAll(".holidayWeekdayChk:checked")).map(c => Number(c.value));
    const startDate = document.getElementById("holidayStartDate").value;
    const endMode = document.querySelector('input[name="holidayEndMode"]:checked').value;
    const endDate = document.getElementById("holidayEndDate").value;
    const iconEl = document.querySelector('input[name="holidayIcon"]:checked');
    const icon = iconEl ? iconEl.value : "island";
    if(!label){ toast("請輸入節日名稱", "error"); return; }
    if(weekdays.length === 0){ toast("請至少選擇一個重複星期", "error"); return; }
    if(!startDate){ toast("請選擇開始日期", "error"); return; }
    if(endMode === "fixed" && !endDate){ toast("請選擇重複結束日期", "error"); return; }
    if(endMode === "fixed" && endDate < startDate){ toast("結束日期不能早於開始日期", "error"); return; }
    state.holidays.push({ id: uid(), label, weekdays, startDate, endMode, endDate: endMode==="fixed" ? endDate : null, icon });
    await saveHolidays();
    toast("節日已新增", "success");
    render();
  }

  async function deleteHoliday(id){
    state.holidays = state.holidays.filter(h => h.id !== id);
    await saveHolidays();
    toast("節日已刪除", "success");
    render();
  }

  async function addCustomIcon(){
    const labelEl = document.getElementById("newIconLabel");
    const label = labelEl ? labelEl.value.trim() : "";
    if(!label){ toast("請輸入圖示名稱", "error"); return; }
    const imageWrap = document.getElementById("newIconImageWrap");
    const isImageType = imageWrap && imageWrap.style.display !== "none";
    let icon;
    if(isImageType){
      const fileInput = document.getElementById("newIconImageFile");
      const file = fileInput && fileInput.files && fileInput.files[0];
      if(!file){ toast("請選擇圖片檔案", "error"); return; }
      try{
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error("讀取圖片失敗"));
          reader.readAsDataURL(file);
        });
        icon = { key: uid(), type: "image", value: dataUrl, label };
      }catch(e){ toast("圖片讀取失敗，請再試一次", "error"); return; }
    } else {
      const emojiEl = document.getElementById("newIconEmoji");
      const emoji = emojiEl ? emojiEl.value.trim() : "";
      if(!emoji){ toast("請輸入一個 Emoji", "error"); return; }
      icon = { key: uid(), type: "emoji", value: emoji, label };
    }
    state.customIcons = state.customIcons || [];
    state.customIcons.push(icon);
    await saveCustomIcons();
    toast("圖示已新增", "success");
    render();
  }

  async function deleteCustomIcon(key){
    state.customIcons = (state.customIcons || []).filter(ic => ic.key !== key);
    await saveCustomIcons();
    toast("圖示已刪除", "success");
    render();
  }

  async function saveHolidayEdit(){
    const h = state.holidays.find(x => x.id === state.editingHolidayId);
    if(!h) return;
    const label = document.getElementById("editHolidayLabel").value.trim();
    const weekdays = Array.from(document.querySelectorAll(".editHolidayWeekdayChk:checked")).map(c => Number(c.value));
    const startDate = document.getElementById("editHolidayStartDate").value;
    const endMode = document.querySelector('input[name="editHolidayEndMode"]:checked').value;
    const endDate = document.getElementById("editHolidayEndDate").value;
    const iconEl = document.querySelector('input[name="editHolidayIcon"]:checked');
    const icon = iconEl ? iconEl.value : "island";
    const errEl = document.getElementById("editHolidayErr");
    if(!label){ errEl.textContent = "請輸入節日名稱"; errEl.style.display = "block"; return; }
    if(weekdays.length === 0){ errEl.textContent = "請至少選擇一個重複星期"; errEl.style.display = "block"; return; }
    if(!startDate){ errEl.textContent = "請選擇開始日期"; errEl.style.display = "block"; return; }
    if(endMode === "fixed" && !endDate){ errEl.textContent = "請選擇重複結束日期"; errEl.style.display = "block"; return; }
    if(endMode === "fixed" && endDate < startDate){ errEl.textContent = "結束日期不能早於開始日期"; errEl.style.display = "block"; return; }

    h.label = label; h.weekdays = weekdays; h.startDate = startDate; h.endMode = endMode; h.endDate = endMode === "fixed" ? endDate : null; h.icon = icon;
    await saveHolidays();
    closeModal();
    toast("節日已更新", "success");
    render();
  }

  // ---------- event delegation ----------
  function attachHandlers(){
    // nothing extra needed; using body-level delegation set once in init()
  }

  function onBodyClick(e){
    const backdrop = e.target.closest('[data-act="modal-backdrop"]');
    if(backdrop && !e.target.closest('[data-stop]')){ closeModal(); return; }

    const t = e.target.closest("[data-act]");
    if(!t) return;
    const act = t.getAttribute("data-act");

    switch(act){
      case "login-open": openLoginModal(); break;
      case "login-submit": doLogin(); break;
      case "logout": doLogout(); break;
      case "modal-close": closeModal(); break;
      case "tab": state.tab = t.getAttribute("data-tab"); render(); break;
      case "prev-month": {
        const t0 = todayDate();
        if(!(state.viewYear===t0.getFullYear() && state.viewMonth===t0.getMonth())){
          state.viewMonth--; if(state.viewMonth<0){ state.viewMonth=11; state.viewYear--; }
          render();
        }
        break;
      }
      case "next-month": state.viewMonth++; if(state.viewMonth>11){ state.viewMonth=0; state.viewYear++; } render(); break;
      case "mini-prev-month": {
        const t0 = todayDate();
        if(!(state.miniViewYear===t0.getFullYear() && state.miniViewMonth===t0.getMonth())){
          state.miniViewMonth--; if(state.miniViewMonth<0){ state.miniViewMonth=11; state.miniViewYear--; }
          render();
        }
        break;
      }
      case "mini-next-month": state.miniViewMonth++; if(state.miniViewMonth>11){ state.miniViewMonth=0; state.miniViewYear++; } render(); break;
      case "pick-day": handleDayPick(t.getAttribute("data-date")); break;
      case "mini-pick-day": {
        const ds = t.getAttribute("data-date");
        const dObj = parseDateStr(ds);
        state.viewYear = dObj.getFullYear(); state.viewMonth = dObj.getMonth();
        render();
        break;
      }
      case "clear-sel": state.selStart=null; state.selEnd=null; state.formError=""; render(); break;
      case "set-entry-period": state.entryPeriod = t.getAttribute("data-period"); render(); break;
      case "set-exit-period": state.exitPeriod = t.getAttribute("data-period"); render(); break;
      case "submit-booking": submitBooking(); break;
      case "edit-open": openEditModal(t.getAttribute("data-id")); break;
      case "delete-open": openDeleteModal(t.getAttribute("data-id")); break;
      case "edit-save": saveEdit(); break;
      case "delete-confirm": confirmDelete(); break;
      case "save-settings": saveSettingsFromForm(); break;
      case "add-holiday": addHoliday(); break;
      case "delete-holiday": deleteHoliday(t.getAttribute("data-id")); break;
      case "holiday-edit-open": openHolidayEditModal(t.getAttribute("data-id")); break;
      case "holiday-edit-save": saveHolidayEdit(); break;
      case "set-new-icon-type": {
        const type = t.getAttribute("data-type");
        document.querySelectorAll(".icon-type-btn").forEach(b => b.classList.toggle("active", b.getAttribute("data-type")===type));
        const emojiWrap = document.getElementById("newIconEmojiWrap");
        const imageWrap = document.getElementById("newIconImageWrap");
        if(emojiWrap) emojiWrap.style.display = (type==="emoji") ? "" : "none";
        if(imageWrap) imageWrap.style.display = (type==="image") ? "" : "none";
        break;
      }
      case "add-custom-icon": addCustomIcon(); break;
      case "delete-custom-icon": deleteCustomIcon(t.getAttribute("data-key")); break;
    }
  }

  function onBodyChange(e){
    if(e.target && e.target.name === "endMode"){
      const dateInput = document.getElementById("setEndDate");
      if(dateInput) dateInput.disabled = (e.target.value !== "fixed");
    }
    if(e.target && e.target.name === "holidayEndMode"){
      const dateInput = document.getElementById("holidayEndDate");
      if(dateInput) dateInput.disabled = (e.target.value !== "fixed");
    }
    if(e.target && e.target.name === "editHolidayEndMode"){
      const dateInput = document.getElementById("editHolidayEndDate");
      if(dateInput) dateInput.disabled = (e.target.value !== "fixed");
    }
    if(e.target && e.target.name === "holidayIcon"){
      const labelEl = document.getElementById("holidayLabel");
      if(labelEl) labelEl.value = getIconDef(e.target.value).label;
    }
    if(e.target && e.target.name === "editHolidayIcon"){
      const labelEl = document.getElementById("editHolidayLabel");
      if(labelEl) labelEl.value = getIconDef(e.target.value).label;
    }
  }

  function onBodyInput(e){
    if(e.target && e.target.id === "mainNameInput"){ state.mainName = e.target.value; }
    if(e.target && e.target.id === "altNameInput"){ state.altName = e.target.value; }
    if(e.target && e.target.id === "noteInput"){ state.note = e.target.value; }
  }
  window.addEventListener('beforeunload', function (e) {
  // 檢查是否正在填寫新增圖示的表單
  const label = document.getElementById("newIconLabel").value;
  if (label && label.trim() !== "") {
    e.preventDefault();
    e.returnValue = ''; // 這會觸發瀏覽器的離開提示
  }
});

  // ---------- init ----------
  async function init(){
    const savedLabel = localStorage.getItem("temp_iconLabel");
    if(savedLabel) document.getElementById("newIconLabel").value = savedLabel;
    document.getElementById("viewRoot").innerHTML = `<div class="empty-state">載入中…</div>`;
    await loadAll();
    render();
    document.body.addEventListener("click", onBodyClick);
    document.body.addEventListener("change", onBodyChange);
    document.body.addEventListener("input", onBodyInput);
    setInterval(refreshShared, 15000);
  }

  init();
})();
</script>
